<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira-clone — Вход</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f6fb;
        color: #1f2a44;
      }

      .card {
        width: min(420px, 92vw);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 24px 60px rgba(31, 42, 68, 0.12);
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .brand {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #0a4bcc;
      }

      .title {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
      }

      .subtitle {
        margin: 16px 0 0;
        color: #5d6b87;
        font-size: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
        color: #2c3a57;
      }

      input {
        border: 1px solid #d5dbe7;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 15px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: #4b7cfb;
        box-shadow: 0 0 0 3px rgba(75, 124, 251, 0.15);
      }

      .actions {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        background: #0a4bcc;
        color: #ffffff;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(10, 75, 204, 0.22);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">Jira-clone</div>
      <div>
        <h1 class="title">Вход</h1>
        <p class="subtitle">Введите логин и пароль, чтобы продолжить.</p>
      </div>
      <form>
        <div class="field">
          <label for="login">Логин</label>
          <input id="login" name="login" type="text" placeholder="Введите логин" />
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Введите пароль"
          />
        </div>
        <div class="actions">
          <button type="submit">Войти</button>
        </div>
      </form>
    </main>
  </body>
</html>
