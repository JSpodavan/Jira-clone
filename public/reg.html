<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira-clone — Вход</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f6fb;
        color: #1f2a44;
      }

      .card {
        width: min(420px, 92vw);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 24px 60px rgba(31, 42, 68, 0.12);
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .brand {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #0a4bcc;
      }

      .title {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
      }

      .subtitle {
        margin: 16px 0 0;
        color: #5d6b87;
        font-size: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field + .field {
        margin-top: 12px;
      }

      .register-only {
        display: none;
      }

      .register-only.visible {
        display: flex;
      }

      label {
        font-size: 14px;
        font-weight: 600;
        color: #2c3a57;
      }

      input {
        border: 1px solid #d5dbe7;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 15px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: #4b7cfb;
        box-shadow: 0 0 0 3px rgba(75, 124, 251, 0.15);
      }

      .validation-list {
        display: none;
        flex-direction: column;
        gap: 6px;
        margin: 6px 0 0;
        padding: 0;
        list-style: none;
        font-size: 12px;
        color: #5d6b87;
      }

      .validation-list.visible {
        display: flex;
      }

      .validation-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .validation-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #e05656;
        flex-shrink: 0;
      }

      .validation-item.valid .validation-dot {
        background: #2f9e44;
      }

      .actions {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
      }

      .secondary-button {
        background: transparent;
        color: #0a4bcc;
        box-shadow: none;
      }

      .secondary-button:hover {
        box-shadow: none;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        background: #0a4bcc;
        color: #ffffff;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(10, 75, 204, 0.22);
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 10;
      }

      .modal.visible {
        display: flex;
      }

      .modal-card {
        width: min(420px, 92vw);
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
        display: flex;
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .modal-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #1f2a44;
      }

      .modal-status {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        color: #0a4bcc;
      }

      .modal-message {
        margin: 0;
        color: #5d6b87;
      }

      .modal-button {
        border: none;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        background: #0a4bcc;
        color: #ffffff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">Jira-clone</div>
      <div>
        <h1 class="title" id="form-title">Вход</h1>
        <p class="subtitle" id="form-subtitle">
          Введите логин и пароль, чтобы продолжить.
        </p>
      </div>
      <form>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Введите email" />
          <ul class="validation-list" id="email-rules">
            <li class="validation-item" id="email-rule-required">
              <span class="validation-dot"></span>
              Поле не может быть пустым
            </li>
            <li class="validation-item" id="email-rule-format">
              <span class="validation-dot"></span>
              Корректный формат email
            </li>
          </ul>
        </div>
        <div class="field register-only" id="name-field">
          <label for="name">Имя</label>
          <input id="name" name="name" type="text" placeholder="Введите имя" />
          <ul class="validation-list" id="name-rules">
            <li class="validation-item" id="name-rule-required">
              <span class="validation-dot"></span>
              Поле не может быть пустым
            </li>
          </ul>
        </div>
        <div class="field register-only" id="surname-field">
          <label for="surname">Фамилия</label>
          <input
            id="surname"
            name="surname"
            type="text"
            placeholder="Введите фамилию"
          />
          <ul class="validation-list" id="surname-rules">
            <li class="validation-item" id="surname-rule-required">
              <span class="validation-dot"></span>
              Поле не может быть пустым
            </li>
          </ul>
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Введите пароль"
          />
          <ul class="validation-list" id="password-rules">
            <li class="validation-item" id="password-rule-required">
              <span class="validation-dot"></span>
              Поле не может быть пустым
            </li>
            <li class="validation-item" id="password-rule-length">
              <span class="validation-dot"></span>
              5–30 символов
            </li>
            <li class="validation-item" id="password-rule-uppercase">
              <span class="validation-dot"></span>
              Есть заглавная буква (A–Z)
            </li>
          </ul>
        </div>
        <div class="actions">
          <button type="button" class="secondary-button" id="toggle-mode">
            Регистрация
          </button>
          <button type="submit" id="submit-button">Войти</button>
        </div>
      </form>
    </main>
    <div class="modal" id="result-modal" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2 class="modal-title">Результат</h2>
        <div class="modal-status" id="modal-status"></div>
        <p class="modal-message" id="modal-message"></p>
        <button type="button" class="modal-button" id="modal-close">Ок</button>
      </div>
    </div>
    <script src="reg.js"></script>
  </body>
</html>
